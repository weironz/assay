services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-assay}
    volumes:
      - pg-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assay}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "false"
    volumes:
      - rustfs-data-prod:/data

  api:
    image: willdockerhub/assay-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-assay}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-assay}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://rustfs:9000
      AUTH_BASE_URL: ${PUBLIC_URL:?set PUBLIC_URL}
      AUTH_TRUST_ORIGINS: ${PUBLIC_URL}
      APP_URL: ${PUBLIC_URL}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rustfs: { condition: service_started }

  web:
    image: willdockerhub/assay-web:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "${WEB_PORT:-8088}:80"
    depends_on:
      - api

volumes:
  pg-data-prod:
  redis-data-prod:
  rustfs-data-prod:
