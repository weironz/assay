services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assay_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-assay}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assay}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin_dev_pwd}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres

  # 开发用邮件捕获器：所有外发邮件进这里，Web UI 查看，不真正外发
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      # 容器内使用服务名连接
      DATABASE_URL: postgresql://${POSTGRES_USER:-assay}:${POSTGRES_PASSWORD:-assay_dev_pwd}@postgres:5432/${POSTGRES_DB:-assay}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://rustfs:9000
      # 开发环境：邮件走 mailpit 捕获器（UI http://localhost:8025）
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: 工单系统 <no-reply@assay.local>
      APP_URL: http://localhost:5173
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api:/app
      - api-node-modules:/app/node_modules
      - attachments-data:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  pg-data:
  redis-data:
  rustfs-data:
  attachments-data:
  api-node-modules:
  web-node-modules:
